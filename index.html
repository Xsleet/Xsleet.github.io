<!-- =========================  TOP NAV  ========================= -->

<!-- =========================  TWO-COLUMN LAYOUT  ========================= -->
<div class="layout" id="top">

  <!-- ===== Sticky Sidebar ===== -->
  <aside class="sidebar">
    <div class="sidebar-photo">
      <img id="profile-photo" src="" alt="Yu Xue" />
    </div>

    <div class="sidebar-name">
      <span id="profile-name-en">Yu Xue</span>
      <span class="sidebar-name-cn" id="profile-name-cn">薛宇</span>
    </div>

    <div class="sidebar-line">
      <span class="pos" id="profile-position"></span>
      <span class="at">@</span>
      <span class="inst" id="profile-affil"></span>
    </div>

    <div class="sidebar-meta">
      <div class="sidebar-meta-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22a8 8 0 0 1 16 0"/><circle cx="10" cy="8" r="5"/><path d="M22 12a4 4 0 0 0-4-4"/><path d="M22 22a4 4 0 0 0-4-4"/></svg>
        <span id="profile-lab"></span>
      </div>
      <div class="sidebar-meta-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="m22 11-3 3-2-2"/></svg>
        <span><span id="advisor-label"></span>: <strong id="profile-advisor"></strong></span>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-bio" id="profile-bio"></div>

    <div class="sidebar-stats" id="profile-stats"></div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-contact" id="profile-contact"></div>
  </aside>

  <!-- ===== Main Content ===== -->
  <main class="main-content" id="main-content">

    <!-- News -->
    <section id="news" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.news"></span></h2>
      <div class="news-list" id="news-list"></div>
      <button class="news-toggle-btn" id="news-toggle"></button>
    </section>

    <!-- Education (moved up) -->
    <section id="education" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.education"></span></h2>
      <div class="edu-list" id="edu-list"></div>
    </section>

    <!-- Research (vertical cards with linked work) -->
    <section id="research" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.research"></span></h2>
      <div class="research-list" id="research-list"></div>
    </section>

    <!-- Publications -->
    <section id="publications" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.pubs"></span></h2>
      <div class="pub-searchbar">
        <label class="pub-search" for="pub-search">
          <span class="pub-search-label" data-i18n="pubs.search"></span>
          <input id="pub-search" type="search" autocomplete="off" />
        </label>
        <button class="pub-clear-btn" id="pub-clear" type="button" data-i18n="pubs.clear"></button>
        <span class="pub-result-count" id="pub-result-count"></span>
      </div>
      <div class="pub-filter">
        <div class="filter-group">
          <span class="filter-group-label" data-i18n="pubs.year"></span>
          <div id="pub-filter-year" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        </div>
        <div class="filter-group">
          <span class="filter-group-label" data-i18n="pubs.role"></span>
          <div id="pub-filter-role" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        </div>
      </div>
      <div class="pub-list" id="pub-list"></div>
    </section>

    <!-- Conference Talks -->
    <section id="talks" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.talks"></span></h2>
      <div class="talk-list" id="talk-list"></div>
    </section>

    <!-- Patents (single column, click to expand) -->
    <section id="patents" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.patents"></span></h2>
      <div class="patent-list" id="patent-list"></div>
    </section>

    <!-- Honors -->
    <section id="honors" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.honors"></span></h2>
      <div class="honor-list" id="honor-list"></div>
    </section>

    <footer class="footer">
      <span data-i18n="common.lastUpd"></span>:
      <span id="last-updated"></span>
      &nbsp;·&nbsp; © 2026 Yu Xue
    </footer>
