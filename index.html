<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yu Xue · 薛宇 — Beihang University</title>
  <meta name="description" content="Yu Xue (薛宇) — Ph.D. Candidate at Beihang University. Research on GNSS integrity monitoring, LEO constellation timescale, and precise time metrology." />
  <meta name="author" content="Yu Xue" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛰️%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<!-- =========================  TOP NAV  ========================= -->
<nav class="nav">
  <div class="nav-inner">
    <a href="#top" class="nav-brand">Yu Xue <span class="dot">·</span> 薛宇</a>
    <ul class="nav-links" id="nav-links"></ul>
    <div class="nav-actions">
      <button id="lang-toggle" class="icon-btn lang-toggle" aria-label="Toggle language">中</button>
      <button id="theme-toggle" class="icon-btn theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </div>
</nav>

<!-- =========================  TWO-COLUMN LAYOUT  ========================= -->
<div class="layout" id="top">

  <!-- ===== Sidebar (sticky, always visible) ===== -->
  <aside class="sidebar">
    <div class="sidebar-photo">
      <img id="profile-photo" src="" alt="Yu Xue" />
    </div>

    <div>
      <div class="sidebar-name">
        <span id="profile-name-en">Yu Xue</span>
        <span class="cn" id="profile-name-cn">薛宇</span>
      </div>
      <div class="sidebar-position" id="profile-position"></div>
      <div class="sidebar-affil" id="profile-affil"></div>
    </div>

    <div>
      <div class="sidebar-lab" id="profile-lab"></div>
      <div class="sidebar-advisor" id="profile-advisor"></div>
    </div>

    <div class="sidebar-bio" id="profile-bio"></div>

    <div class="sidebar-contact" id="profile-contact"></div>
  </aside>

  <!-- ===== Main Content (right column) ===== -->
  <main class="main-content">

    <section id="news" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.news"></span></h2>
      <div class="news-list" id="news-list"></div>
      <button class="news-toggle-btn" id="news-toggle"></button>
    </section>

    <section id="research" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.research"></span></h2>
      <div class="research-grid" id="research-grid"></div>
    </section>

    <section id="publications" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.pubs"></span></h2>
      <div class="pub-filter">
        <div class="filter-group">
          <span class="filter-group-label" data-i18n="pubs.year"></span>
          <div id="pub-filter-year" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        </div>
        <div class="filter-group">
          <span class="filter-group-label" data-i18n="pubs.role"></span>
          <div id="pub-filter-role" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        </div>
      </div>
      <div class="pub-list" id="pub-list"></div>
    </section>

    <section id="patents" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.patents"></span></h2>
      <div class="two-col">
        <div>
          <div class="subsection-title">
            <span data-i18n="patents.invention"></span>
            <span class="count" id="patent-count"></span>
          </div>
          <div class="ip-list" id="patent-list"></div>
        </div>
        <div>
          <div class="subsection-title">
            <span data-i18n="patents.software"></span>
            <span class="count" id="software-count"></span>
          </div>
          <div class="ip-list" id="software-list"></div>
        </div>
      </div>
    </section>

    <section id="honors" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.honors"></span></h2>
      <div class="honor-list" id="honor-list"></div>
    </section>

    <section id="education" class="reveal">
      <h2 class="section-title"><span class="hash">#</span> <span data-i18n="section.education"></span></h2>
      <div class="edu-list" id="edu-list"></div>
    </section>

    <footer class="footer">
      <span data-i18n="common.lastUpd"></span>:
      <script>document.write(new Date().toISOString().slice(0,10))</script>
      &nbsp;·&nbsp; © 2026 Yu Xue
    </footer>

  </main>
</div>

<div id="toast" class="toast"></div>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
